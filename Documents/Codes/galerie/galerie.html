<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galerie de produits</title>
<style>
  :root {
    --bg: #f5f3ff;
    --surface: #ffffff;
    --text: #1f1235;
    --muted: #6b6585;
    --primary: #7c3aed;
    --primary-hover: #6d28d9;
    --shadow: 0 10px 30px rgba(124, 58, 237, 0.15);
    --border: rgba(124, 58, 237, 0.1);
  }
  [data-theme="dark"] {
    --bg: #0f0a1f;
    --surface: #1a1130;
    --text: #f5f3ff;
    --muted: #a39bbf;
    --primary: #a78bfa;
    --primary-hover: #c4b5fd;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    --border: rgba(167, 139, 250, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.4s ease, color 0.4s ease;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 3rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    transition: transform 0.3s ease, background 0.3s ease;
  }
  .theme-toggle:hover { transform: rotate(20deg) scale(1.1); }
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    padding: 2rem 3rem 4rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: pointer;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s ease forwards;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.25s; }
  .card:nth-child(3) { animation-delay: 0.4s; }
  .card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(124, 58, 237, 0.25);
  }
  .card-image {
    height: 220px;
    background-size: cover;
    background-position: center;
    transition: transform 0.6s ease;
  }
  .card:hover .card-image { transform: scale(1.08); }
  .card-body { padding: 1.5rem; }
  .card-title {
    font-size: 1.25rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .card-desc {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 1.25rem;
    line-height: 1.5;
  }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .price {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--primary);
  }
  .btn {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 0.5rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .btn:hover { background: var(--primary-hover); transform: scale(1.05); }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    header, .gallery { padding: 1.5rem; }
  }
</style>
</head>
<body>
  <header>
    <h1>Notre collection</h1>
    <button class="theme-toggle" id="themeToggle" aria-label="Basculer le thème">🌙</button>
  </header>

  <main class="gallery">
    <article class="card">
      <div class="card-image" style="background-image:url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600')"></div>
      <div class="card-body">
        <h2 class="card-title">Sneakers Violet</h2>
        <p class="card-desc">Confort et style pour vos aventures quotidiennes.</p>
        <div class="card-footer">
          <span class="price">9000 cfa</span>
          <button class="btn">Acheter</button>
        </div>
      </div>
    </article>

    <article class="card">
      <div class="card-image" style="background-image:url('https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600')"></div>
      <div class="card-body">
        <h2 class="card-title">Casque Audio</h2>
        <p class="card-desc">Son immersif avec annulation de bruit active.</p>
        <div class="card-footer">
          <span class="price">700 cfa</span>
          <button class="btn">Acheter</button>
        </div>
      </div>
    </article>

    <article class="card">
      <div class="card-image" style="background-image:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600')"></div>
      <div class="card-body">
        <h2 class="card-title">Montre Élégante</h2>
        <p class="card-desc">Design minimaliste pour toutes les occasions.</p>
        <div class="card-footer">
          <span class="price">14000 cfa</span>
          <button class="btn">Acheter</button>
        </div>
      </div>
    </article>
  </main>

  <script>
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;
    toggle.addEventListener('click', () => {
      const next = root.dataset.theme === 'dark' ? 'light' : 'dark';
      root.dataset.theme = next;
      toggle.textContent = next === 'dark' ? '☀️' : '🌙';
    });
  </script>
</body>
</html>
